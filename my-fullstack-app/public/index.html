<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biler Market - Products</title>
<link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="dashboard">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">🛒 Biler</div>

    <nav>
      <a class="active">Products</a>
      <a>Bundle</a>
      <a>License Keys</a>
      <a>Dropshipping</a>
    </nav>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Topbar -->
    <header class="topbar">
      <h2>Products</h2>
      <button onclick="addProduct()">+ Add Product</button>
    </header>

    <!-- Stats -->
    <div class="stats">
      <div>Total: <span id="totalCount">0</span></div>
      <div>Value: <span id="totalValue">$0</span></div>
    </div>

    <!-- Inputs -->
    <div class="controls">
      <input type="text" id="name" placeholder="Product name">
      <input type="number" id="price" placeholder="Price">
      <input type="text" id="search" placeholder="Search..." onkeyup="searchProduct()">
    </div>

    <!-- Products Grid -->
    <div id="productList" class="grid"></div>

  </main>
</div>
  <script src="./js/productAPI.js"></script>

  <!-- Patch to update stats bar when products change -->
  <script>
    // Wrap addProduct to also update stats
    document.addEventListener('DOMContentLoaded', () => {
      const _orig = window.addProduct;
      if (_orig) {
        window.addProduct = function() {
          _orig();
          updateStats();
        };
      }
      updateStats();

      // Observe list changes
      const list = document.getElementById('productList');
      if (list) {
        new MutationObserver(updateStats).observe(list, { childList: true, subtree: true });
      }
    });

    function updateStats() {
      const items = document.querySelectorAll('#productList li:not(.product-list-empty)');
      document.getElementById('totalCount').textContent = items.length;
      let total = 0;
      items.forEach(li => {
        const priceEl = li.querySelector('.product-price');
        if (priceEl) {
          const val = parseFloat(priceEl.textContent.replace(/[^0-9.]/g, ''));
          if (!isNaN(val)) total += val;
        }
      });
      document.getElementById('totalValue').textContent = '$' + total.toFixed(2);
    }
  </script>
</body>
</html>
