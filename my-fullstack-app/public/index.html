<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biler Market - Dashboard</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">

    <!-- Loan section styles (inline so it works without extra file) -->
    <style>
      /* ── LOANS SECTION ────────────────────────────────────────── */
      #loans-section {
        display: none; /* shown by nav */
      }

      #loans-section.active-section {
        display: block;
      }

      #products-section {
        display: block;
      }

      #products-section.hidden-section {
        display: none;
      }

      /* Add loan row */
      .loan-add-row {
        display: flex;
        gap: 10px;
        margin-bottom: 24px;
        align-items: stretch;
      }

      .loan-add-row input {
        flex: 1;
        padding: 11px 16px;
        background: rgba(22, 22, 38, 0.9);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.25s, box-shadow 0.25s;
      }

      .loan-add-row input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
      }

      .loan-add-row input[type="number"] {
        -moz-appearance: textfield;
        appearance: textfield;
      }

      .loan-add-row input[type="number"]::-webkit-inner-spin-button,
      .loan-add-row input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        appearance: none;
      }

      #addLoanBtn {
        width: auto;
        padding: 11px 22px;
        white-space: nowrap;
        font-size: 0.85rem;
      }

      /* Loan stats */
      .loan-stats {
        display: flex;
        gap: 14px;
        margin-bottom: 24px;
      }

      .loan-stats div {
        flex: 1;
        background: rgba(19, 19, 30, 0.8);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px 20px;
        font-size: 0.75rem;
        color: var(--text-muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        position: relative;
        overflow: hidden;
        transition: border-color 0.3s;
      }

      .loan-stats div::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--accent-3), transparent);
        opacity: 0.5;
      }

      .loan-stats div:hover {
        border-color: rgba(244, 114, 182, 0.4);
      }

      .loan-stats div span {
        display: block;
        font-family: 'Syne', sans-serif;
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: none;
        color: var(--text);
        margin-top: 4px;
      }

      /* Loan grid */
      .loan-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
      }

      /* Loan card */
      .loan-card {
        background: rgba(22, 22, 38, 0.85);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        position: relative;
        overflow: hidden;
        transition: border-color 0.3s, transform 0.2s, box-shadow 0.3s;
        animation: fadeUp 0.4s ease both;
      }

      .loan-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--accent-3), var(--accent-2), transparent);
        opacity: 0;
        transition: opacity 0.3s;
      }

      .loan-card:hover {
        border-color: rgba(244, 114, 182, 0.4);
        transform: translateY(-3px);
        box-shadow: 0 12px 40px rgba(244, 114, 182, 0.12);
      }

      .loan-card:hover::before {
        opacity: 1;
      }

      .loan-card-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 16px;
      }

      .loan-badge {
        display: inline-block;
        font-size: 0.65rem;
        padding: 3px 10px;
        border-radius: 99px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 600;
        margin-bottom: 6px;
      }

      .loan-badge.unpaid {
        background: rgba(244, 114, 182, 0.15);
        border: 1px solid rgba(244, 114, 182, 0.3);
        color: #f472b6;
      }

      .loan-badge.partial {
        background: rgba(251, 191, 36, 0.12);
        border: 1px solid rgba(251, 191, 36, 0.3);
        color: #fbbf24;
      }

      .loan-badge.paid {
        background: rgba(52, 211, 153, 0.12);
        border: 1px solid rgba(52, 211, 153, 0.3);
        color: #34d399;
      }

      .loan-amount {
        font-family: 'Syne', sans-serif;
        font-size: 1.4rem;
        font-weight: 800;
        color: var(--text);
        letter-spacing: -0.02em;
      }

      .loan-date {
        font-size: 0.72rem;
        color: var(--text-muted);
        margin-top: 2px;
      }

      .loan-delete-btn {
        width: 28px;
        height: 28px;
        min-width: 28px;
        padding: 0;
        background: rgba(255, 80, 80, 0.1);
        border: 1px solid rgba(255, 80, 80, 0.2);
        border-radius: 8px;
        color: #ff6b6b;
        font-size: 0.75rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s, border-color 0.2s, transform 0.15s;
        box-shadow: none;
      }

      .loan-delete-btn:hover {
        background: rgba(255, 80, 80, 0.22);
        border-color: rgba(255, 80, 80, 0.45);
        transform: scale(1.08);
        box-shadow: none;
      }

      /* Progress bar */
      .loan-progress-wrap {
        margin-bottom: 14px;
      }

      .loan-progress-bar {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.07);
        border-radius: 99px;
        overflow: hidden;
        margin-bottom: 6px;
      }

      .loan-progress-fill {
        height: 100%;
        border-radius: 99px;
        background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3));
        transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .loan-progress-labels {
        display: flex;
        justify-content: space-between;
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      .loan-progress-labels b {
        color: var(--text);
        font-weight: 600;
      }

      /* Pay row */
      .loan-pay-row {
        display: flex;
        gap: 8px;
        margin-top: 4px;
      }

      .loan-pay-input {
        flex: 1;
        padding: 9px 12px;
        background: rgba(10, 10, 22, 0.7);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        font-size: 0.85rem;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
        -moz-appearance: textfield;
        appearance: textfield;
      }

      .loan-pay-input::-webkit-inner-spin-button,
      .loan-pay-input::-webkit-outer-spin-button {
        -webkit-appearance: none;
        appearance: none;
      }

      .loan-pay-input:focus {
        border-color: var(--accent-3);
        box-shadow: 0 0 0 2px rgba(244, 114, 182, 0.15);
      }

      .loan-pay-btn {
        width: auto;
        padding: 9px 16px;
        font-size: 0.8rem;
        background: linear-gradient(135deg, var(--accent-3), var(--accent-2));
        box-shadow: 0 4px 16px rgba(244, 114, 182, 0.3);
        white-space: nowrap;
      }

      .loan-pay-btn:hover {
        box-shadow: 0 6px 22px rgba(244, 114, 182, 0.45);
      }

      /* Fully paid */
      .loan-fully-paid {
        text-align: center;
        font-size: 0.82rem;
        color: var(--success);
        padding: 8px 0 2px;
        letter-spacing: 0.04em;
      }

      /* Empty */
      .loan-empty {
        grid-column: 1 / -1;
        text-align: center;
        padding: 48px 0 20px;
        color: var(--text-muted);
      }

      .loan-empty-icon {
        font-size: 2.5rem;
        margin-bottom: 12px;
        opacity: 0.5;
      }

      .loan-empty p {
        font-size: 0.85rem;
      }

      /* Toast */
      .loan-toast {
        display: none;
        position: fixed;
        bottom: 28px;
        right: 28px;
        z-index: 9999;
        padding: 12px 22px;
        border-radius: 10px;
        font-family: 'Syne', sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        animation: slideDown 0.35s ease;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
      }

      .loan-toast.success {
        background: linear-gradient(135deg, #1a3a2a, #0f2a1a);
        border: 1px solid rgba(52, 211, 153, 0.35);
        color: #34d399;
      }

      .loan-toast.error {
        background: linear-gradient(135deg, #3a1a1a, #2a0f0f);
        border: 1px solid rgba(255, 80, 80, 0.35);
        color: #ff6b6b;
      }
    </style>
  </head>
  <body>
    
    <div class="dashboard">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="logo"><a href="login.html">🛒 Biler</a></div>
        <nav>
          <a class="active" onclick="showSection('products')" id="nav-products">
            <span class="nav-dot"></span>Products
          </a>
          <a onclick="showSection('loans')" id="nav-loans">
            <span class="nav-dot"></span>Loans
          </a>
          <a>Bundle</a>
          <a>License Keys</a>
          <a>Dropshipping</a>
        </nav>
      </aside>

      <!-- Main -->
      <main class="main">

        <!-- ── PRODUCTS SECTION ── -->
        <div id="products-section">
          <header class="topbar">
            <h2>Products</h2>
            <button onclick="addProduct()">+ Add Product</button>
          </header>

          <div class="stats">
            <div>Total Products<span id="totalCount">0</span></div>
            <div>Portfolio Value<span id="totalValue">$0.00</span></div>
          </div>

          <div class="controls">
            <input type="text" id="name" placeholder="Product name" />
            <input type="number" id="price" placeholder="Price ($)" />
            <input
              type="text"
              id="search"
              placeholder="🔍 Search products..."
              onkeyup="searchProduct()"
            />
          </div>

          <div id="productList" class="grid"></div>
        </div>

        <!-- ── LOANS SECTION ── -->
        <div id="loans-section">
          <header class="topbar">
            <h2>Loans</h2>
          </header>

          <!-- Stats -->
          <div class="loan-stats">
            <div>Total Borrowed<span id="loanTotal">$0.00</span></div>
            <div>Remaining<span id="loanRemain">$0.00</span></div>
          </div>

          <!-- Add loan -->
          <div class="loan-add-row">
            <input
              type="number"
              id="loanAmount"
              placeholder="Loan total amount ($)"
              min="1"
            />
            <button id="addLoanBtn" onclick="handleAddLoan()">+ Add Loan</button>
          </div>

          <!-- Loan grid -->
          <div id="loanGrid" class="loan-grid">
            <div class="loan-empty">
              <div class="loan-empty-icon">📋</div>
              <p>No loans yet. Add your first one above.</p>
            </div>
          </div>
        </div>

      </main>
    </div>

    <!-- Scripts -->
    <script src="./js/productAPI.js"></script>
    <script src="./js/loanAPI.js"></script>

    <script>
      // ── Section switcher ──────────────────────────────────────────
      function showSection(name) {
        const productsSection = document.getElementById("products-section");
        const loansSection    = document.getElementById("loans-section");
        const navProducts     = document.getElementById("nav-products");
        const navLoans        = document.getElementById("nav-loans");

        if (name === "loans") {
          productsSection.classList.add("hidden-section");
          loansSection.classList.add("active-section");
          navProducts.classList.remove("active");
          navLoans.classList.add("active");
          loadLoans(); // fetch fresh from API on every open
        } else {
          loansSection.classList.remove("active-section");
          productsSection.classList.remove("hidden-section");
          navLoans.classList.remove("active");
          navProducts.classList.add("active");
        }
      }

      // ── Product stats updater ──────────────────────────────────────
      document.addEventListener("DOMContentLoaded", () => {
        const _orig = window.addProduct;
        if (_orig) {
          window.addProduct = function () {
            _orig();
            updateStats();
          };
        }
        updateStats();

        const list = document.getElementById("productList");
        if (list) {
          new MutationObserver(updateStats).observe(list, {
            childList: true,
            subtree: true,
          });
        }
      });

      function updateStats() {
        const cards = document.querySelectorAll("#productList .product-card");
        const items = document.querySelectorAll(
          "#productList li:not(.product-list-empty)"
        );
        const count = cards.length || items.length;
        document.getElementById("totalCount").textContent = count;

        let total = 0;
        cards.forEach((card) => {
          const priceEl = card.querySelector(".price");
          if (priceEl) {
            const val = parseFloat(priceEl.textContent.replace(/[^0-9.]/g, ""));
            if (!isNaN(val)) total += val;
          }
        });
        items.forEach((li) => {
          const priceEl = li.querySelector(".product-price");
          if (priceEl) {
            const val = parseFloat(priceEl.textContent.replace(/[^0-9.]/g, ""));
            if (!isNaN(val)) total += val;
          }
        });

        document.getElementById("totalValue").textContent =
          "$" + total.toFixed(2);
      }
    </script>
  </body>
</html>
